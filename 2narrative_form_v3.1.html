    dtRight: document.getElementById('dt-right'),
    timer: document.getElementById('timer-display')
};


function toggleStages() {
    const list = document.getElementById('stages-list');
    if (list.style.display === 'block') {
        list.style.display = 'none';
        return;
    }

    let html = '<table>';
    let i = 1;
    for (let key in gameData) {
        html += `<tr><td>${i}</td><td>${key}</td></tr>`;
        i++;
    }
    html += '</table>';
    list.innerHTML = html;
    list.style.display = 'block';
}

function jumpToStage(num) {
    let i = 1;
    for (let key in gameData) {
        if (i === num) {
            runNode(key);
            return true;
        }
        i++;
    }
    return false;
}

let currentPrintId = 0;
let skipThisPrint = false;
let isPrinting = false;
let timerInterval = null;

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') skipThisPrint = true;
});

async function printText(lines, speed = TYPE_SPEED) {
    const myPrintId = ++currentPrintId;
    isPrinting = true;
    skipThisPrint = false;

    try {
        dom.input.disabled = true;
        const cursor = document.querySelector('.cursor-block');
        if (cursor) cursor.style.opacity = '0';

        const old = dom.narrative.innerHTML;
        if (old) dom.narrative.innerHTML = '<span class="history-text">' + old.replace(/class="current-text"/g, '') + '</span>';

        const block = document.createElement('div');
        block.className = 'current-text';

        // Intro Animation Logic
        if (gameData[state.node]?.introAnimation) {
            const wrapper = document.createElement('div');
            wrapper.className = 'intro-wrapper';
            wrapper.appendChild(block);
            dom.narrative.appendChild(wrapper);

            // Trigger animation after a delay or after printing
            setTimeout(() => {
                wrapper.classList.add('shifted');
            }, 3000); // 3s delay for user to see centered content
        } else {
            dom.narrative.appendChild(block);
        }

        for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            if (myPrintId !== currentPrintId) return;

            let line = lines[lineIndex];
            if (typeof line === 'function') line = line(state);

            if (typeof line === 'string' && line.startsWith('//')) {
                const p = document.createElement('div');
                p.className = 'instruction-text';
                const text = line.substring(2).trim();
                block.appendChild(p);
                // Print fast
                p.textContent = text;
                await new Promise(r => setTimeout(r, speed));
                continue;
            }

            if (typeof line === 'string' && line.trim().startsWith('<')) {
                const p = document.createElement('div');
                p.innerHTML = line;
                block.appendChild(p);
                // Print fast (no typewriter for html)
                await new Promise(r => setTimeout(r, speed * 2));
                continue;
            }

            if (!line) { block.appendChild(document.createElement('br')); continue; }


            if (typeof line === 'object' && line.ascii) {
                const div = document.createElement('div');
                div.className = (line.className || 'ascii-art');
                div.textContent = line.ascii;
                block.appendChild(div);

                await new Promise(r => setTimeout(r, 100));
                continue;
            }

            if (typeof line === 'object' && line.definition) {
                const div = document.createElement('div');
                div.className = 'survey-definition';
                div.textContent = line.text;
                block.appendChild(div);
                await new Promise(r => setTimeout(r, 50));
            } else if (typeof line === 'object' && line.dialogue) {
                const dialogueDiv = document.createElement('div');
                dialogueDiv.className = 'dialogue';
                block.appendChild(dialogueDiv);

                const speakerSpan = document.createElement('span');
                speakerSpan.className = 'dialogue-speaker';
                speakerSpan.textContent = line.speaker + ':';
                dialogueDiv.appendChild(speakerSpan);

                const textSpan = document.createElement('span');
                textSpan.className = 'dialogue-text';
                dialogueDiv.appendChild(textSpan);

                const dialogueText = typeof line.text === 'function' ? line.text(state) : line.text;
                await new Promise(r => setTimeout(r, 100));

                for (let i = 0; i < dialogueText.length; i++) {
                    if (myPrintId !== currentPrintId) return;
                    if (skipThisPrint) { textSpan.textContent = dialogueText; break; }
                    textSpan.textContent += dialogueText[i];
                    dom.narrative.scrollTop = dom.narrative.scrollHeight;
                    await new Promise(r => setTimeout(r, speed));
                }
            } else {
                const p = document.createElement('div');
                block.appendChild(p);

                for (let i = 0; i < line.length; i++) {
                    if (myPrintId !== currentPrintId) return;
                    if (skipThisPrint) { p.textContent = line; break; }
                    p.textContent += line[i];
                    dom.narrative.scrollTop = dom.narrative.scrollHeight;
                    await new Promise(r => setTimeout(r, speed));
                }
            }
        }

        skipThisPrint = false;
        isPrinting = false;
        dom.input.disabled = false;
        dom.input.focus();
        if (cursor) cursor.style.opacity = '1';
    } catch (error) {
        isPrinting = false;
        console.error('Error in printText:', error);
        isPrinting = false;
        dom.input.disabled = false;
    }
}


async function runNode(id) {
    try {
        state.node = id;
        const node = gameData[id];
        if (!node) return;

        if (node.lockScroll) {
            dom.narrative.scrollTop = dom.narrative.scrollHeight;
            dom.narrative.classList.add('no-scroll');
        } else {
            dom.narrative.classList.remove('no-scroll');
        }

        if (node.type === 'video_link') {
            const videoUrl = videoLinks[state.data.videoShown];
            if (videoUrl) {
                state.data.videoStartTime = Date.now();
                window.open(videoUrl, '_blank');
            }
            await runNode(node.next);
            return;
        }

        if (node.next && node.type === 'narrative') {
            await printText(node.text);
            if (node.autoDelay) await new Promise(r => setTimeout(r, node.autoDelay));
            await runNode(node.next);
            return;
        }

        if (node.type === 'end') {
            if (node.next && node.type === 'narrative') {
                await printText(node.text);
                if (node.autoDelay) await new Promise(r => setTimeout(r, node.autoDelay));
                await runNode(node.next);
                return;
            }

            await printText(node.text);

            // Handle final logic if it's the generated ending
            if (state.node === 'ending_generated') {
                const prepared = prepareData();

                // Google Sheets Logic
                if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_SCRIPT_URL_HERE") {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Important for Google Apps Script Web App
                        cache: 'no-cache',
                        headers: {
                            'Content-Type': 'text/plain'
                        },
                        redirect: 'follow',
                        body: JSON.stringify(prepared.data)
                    })
                    .then(() => {
                        console.log("Data sent to Google Sheets successfully.");
                        downloadFile(prepared.data, prepared.filename);
                        runNode('ending_success');
                    })
                    .catch((error) => {
                        console.error('Google Sheet Error:', error);
                        downloadFile(prepared.data, prepared.filename);
                        runNode('ending_failed');
                    });
                } else {
                    console.warn("Google Script URL not configured.");
                    downloadFile(prepared.data, prepared.filename);
                    setTimeout(() => runNode('ending_failed'), 2000);
                }
            }
            return;
        }

        await printText(node.text);

    } catch (error) {
        console.error('Error in runNode:', error);
    }
}


async function handleInput(val) {
    try {
        const node = gameData[state.node];
        state.path.push(val);
        const lower = val.toLowerCase();

        if (lower === 'ls') {
            toggleStages();
            return;
        }
        if (lower.startsWith('cd')) {
            const num = parseInt(lower.substring(2));
            if (!isNaN(num)) {
                if (jumpToStage(num)) {
                    // Success
                } else {
                    await printText(["Nie znaleziono etapu " + num]);
                }
                return;
            }
        }

        if (node.type === 'input_name') {
            if (val) {
                state.data.userName = val;
                await runNode(node.next);
            } else {
                await printText(["// Proszę podać imię."]);
            }
            return;
        }



        if (state.node === 'video_check') {
             if (state.data.videoStartTime) {
                state.data.videoWatchTime = Math.floor((Date.now() - state.data.videoStartTime) / 1000);
             }
        }

        if (node.type === 'input') {
            await runNode(node.next);
            return;
        }

        if (node.type === 'input_gender') {
            if (val === '1' || lower.includes('pan') || lower.includes('do pana')) {
                state.data[node.varName] = 'pan';
                await runNode(node.next);
            } else if (val === '2' || lower.includes('pani') || lower.includes('do pani')) {
                state.data[node.varName] = 'pani';
                await runNode(node.next);
            } else {
                await printText(["//wpisz numer 1 lub 2"]);
            }
            return;
        }

        if (node.type === 'input_age') {
            const age = parseInt(val, 10);
            if (!isNaN(age) && age >= 3 && age <= 99) {
                state.data[node.varName] = age;
                await runNode(node.next);
            } else await printText(["// Proszę podać wiek jako liczbę (3-99)."]);
            return;
        }

        if (node.type === 'survey_likert') {
            const number = parseInt(val, 10);
            if (isNaN(number) || number < 1 || number > 5) {
                await printText(["// Proszę podać odpowiedź jako cyfrę (1-5)."]);
                return;
            }
            state.data.survey[state.node] = val;
            await runNode(node.next);
            return;
        }

        if (node.type === 'survey_input') {
            state.data.survey[state.node] = val;
            await runNode(node.next);
            return;
        }

        if (node.type === 'feedback_input') {
            const trimmed = val.trim();
            if (!trimmed) {
                await printText(["// Wpisz wiadomość lub K, aby zakończyć."]);
                return;
            }
            // Special case for 'K' to just finish
            if (trimmed.toLowerCase() === 'k') {
                state.data.feedback = ''; // No message
            } else {
                state.data.feedback = val;
            }
            await runNode(node.next);
            return;
        }

        if (node.type === 'test_story') {
            state.data.survey[state.node] = val;
            dom.narrative.classList.remove('no-scroll');
            await runNode(node.next);
            return;
        }

        if (node.type === 'timed_question') {
            clearInterval(timerInterval);
            dom.timer.style.display = 'none';
            state.data.survey[state.node] = val;
            await runNode(node.next);
            return;
        }

        if (node.type === 'data_collection_1_choice') {
            const num = parseInt(val.match(/\d+/)?.[0]);
            if (num >= 1 && num <= 6) {
                state.data.choice1_id = num;
                // For video link logic, assume videoShown corresponds to this choice
                state.data.videoShown = num.toString();
                await runNode(node.next);
                return;
            }
            await printText(["// Podaj numer instytucji (1-6)."]);
            return;
        }

        if (node.type === 'data_collection_1_certainty_input') {
            const num = parseInt(val.match(/\d+/)?.[0]);
            if (num >= 1 && num <= 3) {
                state.data.choice1_certainty = num;
                await runNode(node.next);
                return;
            }
            await printText(["// Wpisz 1, 2 lub 3."]);
            return;
        }

        if (node.type === 'data_collection_1_reservations_input') {
            state.data.choice1_reservations = val;
            await runNode(node.next);
            return;
        }

        if (node.type === 'data_collection_2_choice') {
            const num = parseInt(val.match(/\d+/)?.[0]);
            if (num >= 1 && num <= 6) {
                state.data.choice2_id = num;
                await runNode(node.next);
                return;
            }
            await printText(["// Podaj numer instytucji (1-6)."]);
            return;
        }

        if (node.type === 'data_collection_2_certainty_input') {
            const num = parseInt(val.match(/\d+/)?.[0]);
            if (num >= 1 && num <= 3) {
                state.data.choice2_certainty = num;
                await runNode(node.next);
                return;
            }
            await printText(["// Wpisz 1, 2 lub 3."]);
            return;
        }

        if (node.type === 'data_collection_2_reservations_input') {
            state.data.choice2_reservations = val;
            await runNode(node.next);
            return;
        }

        if (node.type === 'retry_choice') {
            if (lower.includes('tak') || lower === 'y') await runNode(node.keywords['tak']);
            else if (lower.includes('nie') || lower === 'n') await runNode(node.keywords['nie']);
            else await printText(["// Wpisz: TAK lub NIE"]);
            return;
        }

        if (node.keywords) {
            let bestMatch = null;
            let maxLen = 0;

            for (let key in node.keywords) {
                if (lower.includes(key)) {
                    if (key.length > maxLen) {
                        maxLen = key.length;
                        bestMatch = node.keywords[key];
                    }
                }
            }

            if (bestMatch) {
                const target = bestMatch;
                if (target === 'knock_door') {
                    const chosenNum = parseInt(val.match(/\d/)?.[0]);
                    if (chosenNum >= 1 && chosenNum <= 6) {
                        state.data.firstChoice = chosenNum;
                    }
                }
                await runNode(target);
                return;
            }
        }

        await printText(["// Spróbuj inaczej sformułować komendę."]);
    } catch (error) {
        console.error('Error in handleInput:', error);
    }
}

function startTimer(duration) {
    let timeLeft = duration;
    dom.timer.style.display = 'block';

    const updateTimer = () => {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        dom.timer.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            dom.timer.style.display = 'none';
            handleInput('[CZAS_MINAL]');
        }
        timeLeft--;
    };

    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
}

function prepareData() {
    const now = new Date();
    const dateStr = now.toISOString().split('T')[0];
    const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '-');
    const filename = `${state.data.userName || 'Anonim'}_${state.data.userAge || 'X'}_${dateStr}_${timeStr}.json`;
    state.data.generatedFilename = filename;

    const data = {
        metryka: {
            imie: state.data.userName,
            wiek: state.data.userAge,
            plec: (state.data.userGender === 'pan' ? 'mężczyzna' : 'kobieta')
        },
        ankieta: {
            zamkniete: {
                q1: state.data.survey['survey_likert_1'] || 'brak',
                q2: state.data.survey['survey_likert_2'] || 'brak'
            },
            otwarte: {
                q1: state.data.survey['survey_open_1'] || 'brak'
            }
        },
        wybory: {
            idealny_kandydat: state.data.survey['biuro'] || 'brak',
            wybor_1_instytucja: state.data.choice1_id ? orgNames[state.data.choice1_id - 1] : 'brak',
            wybor_1_pewnosc: state.data.choice1_certainty || 'brak',
            wybor_1_zastrzezenia: state.data.choice1_reservations || 'brak',
            obejrzany_film: state.data.videoShown ? orgNames[parseInt(state.data.videoShown) - 1] : 'brak',
            czas_ogladania_wideo_procent: (state.data.videoWatchTime && state.data.videoShown) ? Math.round((state.data.videoWatchTime / (videoLengths[state.data.videoShown] || 60)) * 100) + '%' : 'brak',
            wybor_2_instytucja: state.data.choice2_id ? orgNames[state.data.choice2_id - 1] : 'brak',
            wybor_2_pewnosc: state.data.choice2_certainty || 'brak',
            wybor_2_zastrzezenia: state.data.choice2_reservations || 'brak'
        },
        testy: {
            historia_q1: state.data.survey['test_story_1'] || 'brak',
            historia_q2: state.data.survey['test_story_2'] || 'brak',
            historia_q3: state.data.survey['test_story_3'] || 'brak',
            film_q1: state.data.survey['test_film_1'] || 'brak',
            film_q2: state.data.survey['test_film_2'] || 'brak',
            film_q3: state.data.survey['test_film_3'] || 'brak'
        },
        tresc_wyjasnienia: document.querySelector('.special-ending') ? document.querySelector('.special-ending').innerText : 'Brak',
        feedback_od_uzytkownika: state.data.feedback || 'brak'
    };

    state.data.jsonData = data; // Store for email
    return { data, filename };
}

function downloadFile(data, filename) {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
}

function updateDisplay() {
    if (!dom.displayText) return;
    const val = dom.input.value.toUpperCase();
    const pos = dom.input.selectionStart;

    const left = val.substring(0, pos);
    const right = val.substring(pos);

    dom.dtLeft.textContent = left;
    dom.dtRight.textContent = right;
}

// Intro sequence
// Modified: Blink in terminal, wait, then print
window.onload = () => {
    // Re-bind elements since IDs changed
    dom.displayText = document.getElementById('display-text-container');
    dom.dtLeft = document.getElementById('dt-left');
    dom.dtRight = document.getElementById('dt-right');

    dom.input.addEventListener('input', updateDisplay);
    dom.input.addEventListener('keyup', updateDisplay);
    dom.input.addEventListener('click', updateDisplay);

    dom.input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (isPrinting) {
                    skipThisPrint = true;
                    e.preventDefault();
                    return;
                }

                const val = dom.input.value.trim();
            dom.input.value = '';
            // Reset visual display
            dom.dtLeft.textContent = '';
            dom.dtRight.textContent = '';

            const echo = document.createElement('div');
            echo.className = 'history-text';
            echo.textContent = '> ' + val.toUpperCase();
            dom.narrative.appendChild(echo);
            dom.narrative.scrollTop = dom.narrative.scrollHeight;

            if (!val && !['input', 'input_age', 'input_gender', 'feedback_input'].includes(gameData[state.node]?.type)) return;

            // Start timer for timed questions
            if (gameData[state.node]?.type === 'timed_question' && val) {
                // Process answer immediately
            } else if (gameData[state.node]?.type === 'timed_question') {
                startTimer(gameData[state.node].duration);
                return;
            }

            handleInput(val);
        }
    });
    dom.input.focus();
    document.addEventListener('click', () => dom.input.focus());

    // START INTRO (Standard load)
    setTimeout(() => runNode('intro_1'), 200);
};
